name: Live API Tests

# Runs the live-tag test tier (go test -tags=live ./...) against real
# Bitbucket using an OAuth consumer's client_credentials grant. Scheduled
# nightly and available via manual dispatch. No-ops cleanly if secrets
# aren't configured, so this workflow is safe to keep enabled before the
# consumer is wired up.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   BBKT_LIVE_WORKSPACE       workspace slug to exercise (required)
#   BBKT_OAUTH_CLIENT_ID      OAuth consumer Key (required)
#   BBKT_OAUTH_CLIENT_SECRET  OAuth consumer Secret (required)
#   BBKT_LIVE_REPO            repo slug for repo/PR-level tests (optional)

on:
  schedule:
    - cron: "17 7 * * *" # 07:17 UTC nightly
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live:
    name: Live smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for required secrets
        id: guard
        env:
          BBKT_LIVE_WORKSPACE: ${{ secrets.BBKT_LIVE_WORKSPACE }}
          BBKT_OAUTH_CLIENT_ID: ${{ secrets.BBKT_OAUTH_CLIENT_ID }}
          BBKT_OAUTH_CLIENT_SECRET: ${{ secrets.BBKT_OAUTH_CLIENT_SECRET }}
        run: |
          if [ -z "$BBKT_LIVE_WORKSPACE" ] || [ -z "$BBKT_OAUTH_CLIENT_ID" ] || [ -z "$BBKT_OAUTH_CLIENT_SECRET" ]; then
            echo "Live-test secrets not configured — skipping."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.guard.outputs.configured == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Exchange consumer creds for access token
        id: token
        if: steps.guard.outputs.configured == 'true'
        env:
          BBKT_OAUTH_CLIENT_ID: ${{ secrets.BBKT_OAUTH_CLIENT_ID }}
          BBKT_OAUTH_CLIENT_SECRET: ${{ secrets.BBKT_OAUTH_CLIENT_SECRET }}
        run: |
          # client_credentials grant — machine-to-machine, no browser needed.
          token=$(curl -sS -u "$BBKT_OAUTH_CLIENT_ID:$BBKT_OAUTH_CLIENT_SECRET" \
            -d grant_type=client_credentials \
            https://bitbucket.org/site/oauth2/access_token \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])')
          if [ -z "$token" ]; then
            echo "::error::failed to obtain access token from Bitbucket"
            exit 1
          fi
          # Mask the token in logs and hand it to the next step via env.
          echo "::add-mask::$token"
          echo "access_token=$token" >> "$GITHUB_OUTPUT"

      - name: Run live tests
        if: steps.guard.outputs.configured == 'true'
        env:
          BBKT_LIVE_WORKSPACE: ${{ secrets.BBKT_LIVE_WORKSPACE }}
          BBKT_LIVE_REPO: ${{ secrets.BBKT_LIVE_REPO }}
          BITBUCKET_ACCESS_TOKEN: ${{ steps.token.outputs.access_token }}
        run: go test -tags=live -v -timeout 5m ./internal/bitbucket/...
